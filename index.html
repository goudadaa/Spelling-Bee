<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Spelling Bee Wizard - Practice Spellings</title>
    
    <!-- PWA Capabilities and Asset Configurations -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#768672" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Spelling Bee" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />

    <!-- Import Fredoka & Fredoka One Google Fonts for playful, rounded, readable children-friendly typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  </head>
  <body class="bg-natural-bg text-natural-text antialiased selection:bg-natural-cream">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((reg) => {
              console.log('Spelling Bee Service Worker registered successfully on scope:', reg.scope);
            })
            .catch((err) => {
              console.error('Spelling Bee Service Worker registration failed:', err);
            });
        });
      }
    </script>
  </body>
</html>
