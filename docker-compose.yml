name: practice-spellings-app

services:
  spelling-app:
    # Use the locally built image (or pull from repository).
    # Since you successfully ran `docker build -t goudada/spelling-bee .`, Docker will use your local cache!
    image: goudada/spelling-bee:latest
    
    # If building locally via Docker Compose CLI, you can uncomment the lines below:
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    container_name: practice_spellings_wizard
    restart: unless-stopped
    ports:
      - "4567:4567"
    environment:
      - NODE_ENV=production
      - PORT=4567
    volumes:
      # Maps local 'data' folder to persist custom lists & highscores across restarts
      - ./data:/app/data
